services:
  dev:
    build: .
    container_name: claude-workspace
    # Full GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Mount projects at the SAME absolute path inside container as on host
      # so Claude Code can find existing chat history (it indexes by absolute path)
      - ${PROJECTS_DIR:-/tmp/empty}:${PROJECTS_DIR:-/tmp/empty}
      # Persist VS Code extensions, settings, and workspace state across rebuilds
      - code-server-data:/root/.local/share/code-server
      # Persist code-server config (TLS settings, machine ID) so sessions survive restarts
      - code-server-config:/root/.config/code-server
      # Bind-mount host ~/.claude so existing chats, auth, and config are shared
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      # Git config and SSH keys from host (ssh mounted to staging path;
      # entrypoint copies to /root/.ssh with correct ownership/permissions)
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/etc/ssh-host:ro
      # Forward host SSH agent (for passphrase-protected keys)
      - ${SSH_AUTH_SOCK:-/dev/null}:/tmp/ssh-agent.sock:ro
      # Tailscale TLS certs for HTTPS (generated on host with `tailscale cert`)
      - /etc/tailscale/certs:/etc/tailscale/certs:ro
    environment:
      # Set your password here (or use a .env file)
      - PASSWORD=${CODE_SERVER_PASSWORD:-changeme}
      - PROJECTS_DIR=${PROJECTS_DIR:-/tmp/empty}
      - SSH_AUTH_SOCK=/tmp/ssh-agent.sock
    # Host networking lets `claude login` OAuth callback reach the container
    # (code-server will be at http://localhost:8080 directly)
    network_mode: host
    restart: unless-stopped
    # Give Claude Code full permissions - no stuck prompts
    privileged: false
    security_opt:
      - seccomp:unconfined

  # ---- Optional: Tailscale sidecar for phone access ----
  # Uncomment this block to expose your dev container over Tailscale
  # without opening ports on your network.
  #
  # Setup:
  #   1. Go to https://login.tailscale.com/admin/settings/keys
  #   2. Generate an auth key (reusable, ephemeral is fine)
  #   3. Set it: export TS_AUTHKEY=tskey-auth-xxxxx
  #   4. Install Tailscale on your phone
  #   5. Access code-server at http://claude-workspace:8080 from your phone
  #
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: tailscale-dev
  #   hostname: claude-workspace
  #   environment:
  #     - TS_AUTHKEY=${TS_AUTHKEY}
  #     - TS_STATE_DIR=/var/lib/tailscale
  #     - TS_EXTRA_ARGS=--advertise-tags=tag:dev
  #   volumes:
  #     - tailscale-state:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   network_mode: service:dev   # shares network with dev container
  #   restart: unless-stopped

volumes:
  code-server-data:
  code-server-config:
  # tailscale-state:
