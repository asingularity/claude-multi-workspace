services:
  dev:
    build: .
    container_name: claude-workspace
    # Full GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Mount projects at the SAME absolute path as on host so Claude Code
      # can find existing chat history (it indexes by absolute project path)
      - ~/projects:/home/csaba/projects
      # Persist VS Code extensions and settings across rebuilds
      - code-server-data:/root/.local/share/code-server
      # Bind-mount host ~/.claude so existing chats, auth, and config are shared
      - ~/.claude:/root/.claude
    environment:
      # Set your password here (or use a .env file)
      - PASSWORD=${CODE_SERVER_PASSWORD:-changeme}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    # Host networking lets `claude login` OAuth callback reach the container
    # (code-server will be at http://localhost:8080 directly)
    network_mode: host
    restart: unless-stopped
    # Give Claude Code full permissions - no stuck prompts
    privileged: false
    security_opt:
      - seccomp:unconfined

  # ---- Optional: Tailscale sidecar for phone access ----
  # Uncomment this block to expose your dev container over Tailscale
  # without opening ports on your network.
  #
  # Setup:
  #   1. Go to https://login.tailscale.com/admin/settings/keys
  #   2. Generate an auth key (reusable, ephemeral is fine)
  #   3. Set it: export TS_AUTHKEY=tskey-auth-xxxxx
  #   4. Install Tailscale on your phone
  #   5. Access code-server at http://claude-workspace:8080 from your phone
  #
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: tailscale-dev
  #   hostname: claude-workspace
  #   environment:
  #     - TS_AUTHKEY=${TS_AUTHKEY}
  #     - TS_STATE_DIR=/var/lib/tailscale
  #     - TS_EXTRA_ARGS=--advertise-tags=tag:dev
  #   volumes:
  #     - tailscale-state:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   network_mode: service:dev   # shares network with dev container
  #   restart: unless-stopped

volumes:
  code-server-data:
  # tailscale-state:
